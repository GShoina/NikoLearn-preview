<!-- global crash guard: a real uncaught JS error shows a friendly, child-readable recovery screen
     instead of a frozen/blank app. Resource 404s (img/audio) are ignored (e.error is null for those). -->
<script>
(function(){
  var shown=false;
  function recover(){
    if(shown)return;shown=true;
    try{
      var d=document.createElement('div');
      d.setAttribute('style','position:fixed;inset:0;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#f4ead9;color:#2b2740;font-family:system-ui,sans-serif;text-align:center;padding:24px');
      d.innerHTML='<div style="font-size:4rem">🦉</div><div style="font-size:1.2rem;font-weight:700">უი, რაღაც აირია</div><div style="opacity:.7;max-width:300px;line-height:1.5">მოდი, თავიდან ვცადოთ.</div>';
      var b=document.createElement('button');
      b.textContent='🔄 თავიდან';
      b.setAttribute('style','margin-top:6px;padding:14px 30px;border:none;border-radius:18px;background:#F2894C;color:#fff;font-size:1.05rem;font-weight:700;cursor:pointer');
      b.onclick=function(){location.reload();};
      d.appendChild(b);(document.body||document.documentElement).appendChild(d);
    }catch(e){}
  }
  window.addEventListener('error',function(e){ if(e&&e.error)recover(); }); // real exceptions only
  window.addEventListener('unhandledrejection',function(e){ try{e&&e.preventDefault&&e.preventDefault();}catch(x){} }); // swallow noise, no UI
})();
</script>

// fill bottom-nav icons. Deferred modules run before DOMContentLoaded, so `I` + #bottomnav are ready here.
document.addEventListener('DOMContentLoaded',function(){
  if(typeof I==='undefined')return;
  // position-aware fill (by data-nav, so inserting a button never misaligns icons)
  var ico={home:I.home,theme:'<span class="navemoji">🎨</span>',lang:'<span class="navemoji">🌐</span>',abc:I.abc,math:I.calc};
  document.querySelectorAll('#bottomnav button').forEach(function(btn){
    var key=btn.getAttribute('data-nav'); if(ico[key])btn.innerHTML=ico[key]+'<span class="navdot"></span>';
  });
});
</script>

<!-- PWA: offline + installable + auto-update (layered on, non-invasive) -->
<script>
(function(){
  if(!('serviceWorker' in navigator)) return;
  // Was a worker already controlling this page at load? (false on a first-ever visit)
  var hadController = !!navigator.serviceWorker.controller;
  // When a NEW service worker takes control (after sw.js skipWaiting()+clients.claim()),
  // reload ONCE so the page actually runs the new code. Without this, a returning user keeps
  // running the old cached app for a whole session after a deploy. Guarded so a first-ever
  // install and any repeat activation never trigger a reload loop.
  var reloaded = false;
  navigator.serviceWorker.addEventListener('controllerchange', function(){
    if(reloaded || !hadController) return;
    reloaded = true;
    location.reload();
  });
  navigator.serviceWorker.register('sw.js').then(function(reg){
    reg.update();                                          // check for a newer worker on every open
    setInterval(function(){ reg.update(); }, 30*60*1000);  // and periodically if the app is left open
  }).catch(function(){});
})();
</script>
