<!DOCTYPE html><html lang="ka"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>„ყოჩაღ, წავედით!"</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+Georgian:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
  * { box-sizing:border-box; }
  .scr::-webkit-scrollbar { display:none; }
  .geo { font-family:'Noto Sans Georgian','Inter',sans-serif; }
  .pop { font-family:'Poppins','Noto Sans Georgian',sans-serif; }
  @keyframes bob   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  @keyframes bobS  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  @keyframes ring  { 0%{transform:scale(.8); opacity:.5} 100%{transform:scale(1.5); opacity:0} }
  @keyframes vbar  { 0%,100%{transform:scaleY(.35)} 50%{transform:scaleY(1)} }
  @keyframes glow  { 0%,100%{box-shadow:0 0 0 0 rgba(0,196,140,.35),0 14px 26px -8px rgba(0,196,140,.4)} 60%{box-shadow:0 0 0 14px rgba(0,196,140,0),0 14px 26px -8px rgba(0,196,140,.4)} }
  @keyframes twinkle { 0%,100%{opacity:.35; transform:scale(.85)} 50%{opacity:1; transform:scale(1.1)} }
  @keyframes sheen { 0%{transform:translateX(-130%) skewX(-16deg)} 55%,100%{transform:translateX(320%) skewX(-16deg)} }
  @keyframes pop   { 0%{transform:scale(.6); opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1); opacity:1} }
  @media (prefers-reduced-motion: reduce) { * { animation:none !important; } }

body{margin:0;padding:28px;background:#F5EFE6;display:flex;justify-content:center;}}
.frame-reset{{position:relative !important;left:auto !important;top:auto !important;}}</style></head><body>
<!-- ===================== 3 · "GREAT, LET'S GO" ===================== -->
<div style="position:relative; width:420px;" class="geo">
  <div data-drags-parent="1" style="display:flex; align-items:center; gap:11px; margin-bottom:13px; cursor:grab;">
    <span class="pop" style="font-size:14px; font-weight:700; color:#fff; background:#00C48C; width:30px; height:30px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center;">3</span>
    <span class="pop" style="font-size:20px; font-weight:700; color:#2A1C12;">„ყოჩაღ, წავედით!"</span>
  </div>
  <div style="width:402px; background:#2A1810; border-radius:56px; padding:11px; box-shadow:0 40px 70px -24px rgba(42,24,16,.5);">
    <div class="scr" style="position:relative; height:836px; background:linear-gradient(180deg,#E7FBF2 0%,#FAF5EC 55%); border-radius:46px; overflow:hidden;">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 30px 0;">
        <span class="pop" style="font-size:16px; font-weight:600; color:#2A1C12;">9:41</span>
        <span style="display:inline-flex; align-items:center; gap:7px;"><svg width="19" height="13" viewBox="0 0 19 13" fill="#2A1C12"><rect x="0" y="8" width="3" height="5" rx="1"></rect><rect x="5" y="5" width="3" height="8" rx="1"></rect><rect x="10" y="2.5" width="3" height="10.5" rx="1"></rect><rect x="15" y="0" width="3" height="13" rx="1" opacity=".35"></rect></svg><svg width="26" height="13" viewBox="0 0 26 13"><rect x="0.5" y="0.5" width="21" height="12" rx="3.5" fill="none" stroke="#2A1C12" stroke-opacity=".4"></rect><rect x="2.2" y="2.2" width="15" height="8.6" rx="2" fill="#2A1C12"></rect><rect x="23" y="4" width="2" height="5" rx="1" fill="#2A1C12" fill-opacity=".4"></rect></svg></span>
      </div>

      <div style="position:absolute; inset:64px 0 0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 40px;">
        <div style="position:relative; width:200px; height:200px; display:flex; align-items:center; justify-content:center;">
          <span style="position:absolute; inset:0; border-radius:50%; background:#C8F3E5; animation:ring 2.8s ease-out infinite;"></span>
          <span style="position:absolute; inset:0; border-radius:50%; background:#C8F3E5; animation:ring 2.8s ease-out infinite 1.4s;"></span>
          <div style="position:relative; width:168px; height:168px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 22px 46px -18px rgba(0,196,140,.4); animation:bob 3.2s ease-in-out infinite;"><img src="6f19be5c-d0db-4148-a6c9-cbf460cd0dd1" style="width:128px; height:auto;"></div>
          <div style="position:absolute; bottom:6px; right:14px; width:50px; height:50px; border-radius:50%; background:#00C48C; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 16px -6px rgba(0,196,140,.6);"><svg width="27" height="27" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 10-10"></path></svg></div>
        </div>
        <!-- voice -->
        <div style="display:inline-flex; align-items:center; gap:8px; margin-top:26px; background:#fff; padding:9px 16px; border-radius:100px; box-shadow:0 8px 18px -12px rgba(42,24,16,.3);">
          <span style="display:inline-flex; align-items:flex-end; gap:3px; height:16px;"><span style="width:3.5px; height:16px; background:#00C48C; border-radius:2px; animation:vbar 1s ease-in-out infinite;"></span><span style="width:3.5px; height:16px; background:#00C48C; border-radius:2px; animation:vbar 1s ease-in-out infinite .15s;"></span><span style="width:3.5px; height:16px; background:#00C48C; border-radius:2px; animation:vbar 1s ease-in-out infinite .3s;"></span></span>
          <span class="pop" style="font-size:13px; font-weight:700; color:#0E9E78;">ნიკო</span>
        </div>
        <div class="pop" style="font-size:32px; font-weight:800; color:#2A1C12; margin-top:22px; text-align:center; line-height:1.15;">ყოჩაღ!<br>წავედით! 🎉</div>
      </div>

      <div style="position:absolute; bottom:26px; left:24px; right:24px; text-align:center;"><span style="font-size:12px; font-weight:600; color:#B8A88E; font-family:'Inter','Noto Sans Georgian',sans-serif;">＊ მოკლე გადასვლა (~1 წმ) → პირდაპირ დავალებაზე</span></div>
    </div>
  </div>
  <div style="width:402px; margin-top:14px; background:#fff; border-radius:18px; padding:15px 17px; box-shadow:0 8px 20px -14px rgba(42,24,16,.25);">
    <div class="pop" style="font-size:15.5px; font-weight:800; color:#2A1C12;">„ნიკო მეხმარება!"</div>
    <div style="font-size:12.5px; color:#6E5A45; line-height:1.5; margin-top:4px;">ნიკო მასწავლებელივით უძღვება — ხმით, თბილად. გადასვლა მოკლეა, არ აჭიანურებს. პირდაპირ დავალებაზე, არც მენიუ, არც დატვირთვის ეკრანი.</div>
  </div>
</div>


</body></html>
