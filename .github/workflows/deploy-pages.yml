name: Deploy to GitHub Pages

# Replaces the legacy "deploy from a branch" flow, whose per-file CDN sync of ~1700 repo files
# (mostly the 1400+ audio clips) repeatedly timed out at the 10-minute deploy limit. This uploads
# the site as ONE tar artifact and deploys it atomically, which handles large static sites cleanly.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish (don't cancel a live deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment_retry.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble published site (explicit ALLOWLIST, keep CNAME)
        run: |
          # ALLOWLIST publish (NB-24): copy ONLY the files/dirs that make up the public site.
          # Flipped from the old rsync denylist so a newly-added tracked file (internal docs,
          # cloudflare/, competitor-profiles/, CLAUDE.md, etc.) can NEVER reach nikolearn.com by
          # default. It publishes only if explicitly named here. cp fails loudly if a required
          # core file is ever removed, which is safer than silently shipping a broken site.
          mkdir -p _site
          for f in \
            index.html landing.html privacy.html \
            sw.js manifest.json \
            CNAME robots.txt \
            favicon.svg favicon-32.png favicon-180.png apple-touch-180.png \
            icon-192.png icon-512.png icon-maskable-512.png \
            og-image.png og-image.svg owl-logo.png; do
            cp "$f" _site/
          done
          for d in niko assets movement share; do
            cp -r "$d" _site/
          done
          echo "Published file count: $(find _site -type f | wc -l)"
          test -f _site/CNAME && echo "CNAME present: $(cat _site/CNAME)" || echo "WARNING: no CNAME"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      # GitHub Pages' backend intermittently fails a freshly-created deployment at the status check
      # with "Deployment failed, try again later." (their infra, not our build — the artifact uploaded
      # fine). It used to need a manual re-push, which spammed the owner with failure emails. Attempt 1
      # is allowed to fail softly; a short wait + attempt 2 rescues the run so it ends GREEN. Only if
      # BOTH attempts fail (a real Pages outage) does the run fail and notify.
      - name: Deploy to GitHub Pages (attempt 1)
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
        with:
          timeout: 600000

      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 25

      - name: Deploy to GitHub Pages (attempt 2, retry transient failure)
        id: deployment_retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000
