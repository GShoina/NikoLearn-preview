<!DOCTYPE html><html lang="ka"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>შეხება · ბავშვი ირჩევს</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700;800&family=Noto+Sans+Georgian:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
  * { box-sizing:border-box; }
  .scr::-webkit-scrollbar { display:none; }
  .geo { font-family:'Noto Sans Georgian','Inter',sans-serif; }
  .pop { font-family:'Poppins','Noto Sans Georgian',sans-serif; }
  @keyframes bob   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
  @keyframes bobS  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes breathe { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }
  @keyframes ring  { 0%{transform:scale(.8); opacity:.5} 100%{transform:scale(1.5); opacity:0} }
  @keyframes vbar  { 0%,100%{transform:scaleY(.35)} 50%{transform:scaleY(1)} }
  @keyframes glow  { 0%,100%{box-shadow:0 0 0 0 rgba(0,196,140,.35),0 14px 26px -8px rgba(0,196,140,.4)} 60%{box-shadow:0 0 0 14px rgba(0,196,140,0),0 14px 26px -8px rgba(0,196,140,.4)} }
  @keyframes twinkle { 0%,100%{opacity:.35; transform:scale(.85)} 50%{opacity:1; transform:scale(1.1)} }
  @keyframes sheen { 0%{transform:translateX(-130%) skewX(-16deg)} 55%,100%{transform:translateX(320%) skewX(-16deg)} }
  @keyframes pop   { 0%{transform:scale(.6); opacity:0} 60%{transform:scale(1.08)} 100%{transform:scale(1); opacity:1} }
  @media (prefers-reduced-motion: reduce) { * { animation:none !important; } }

body{margin:0;padding:28px;background:#F5EFE6;display:flex;justify-content:center;}}
.frame-reset{{position:relative !important;left:auto !important;top:auto !important;}}</style></head><body>
<!-- ===================== 2 · TAP (child picks) ===================== -->
<div style="position:relative; width:420px;" class="geo">
  <div data-drags-parent="1" style="display:flex; align-items:center; gap:11px; margin-bottom:13px; cursor:grab;">
    <span class="pop" style="font-size:14px; font-weight:700; color:#fff; background:#FF8A00; width:30px; height:30px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center;">2</span>
    <span class="pop" style="font-size:20px; font-weight:700; color:#2A1C12;">შეხება · ბავშვი ირჩევს</span>
  </div>
  <div style="width:402px; background:#2A1810; border-radius:56px; padding:11px; box-shadow:0 40px 70px -24px rgba(42,24,16,.5);">
    <div class="scr" style="position:relative; height:836px; background:linear-gradient(180deg,#FFF3DF 0%,#FAF5EC 46%); border-radius:46px; overflow:hidden;">
      <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 30px 0;">
        <span class="pop" style="font-size:16px; font-weight:600; color:#2A1C12;">9:41</span>
        <span style="display:inline-flex; align-items:center; gap:7px;"><svg width="19" height="13" viewBox="0 0 19 13" fill="#2A1C12"><rect x="0" y="8" width="3" height="5" rx="1"></rect><rect x="5" y="5" width="3" height="8" rx="1"></rect><rect x="10" y="2.5" width="3" height="10.5" rx="1"></rect><rect x="15" y="0" width="3" height="13" rx="1" opacity=".35"></rect></svg><svg width="26" height="13" viewBox="0 0 26 13"><rect x="0.5" y="0.5" width="21" height="12" rx="3.5" fill="none" stroke="#2A1C12" stroke-opacity=".4"></rect><rect x="2.2" y="2.2" width="15" height="8.6" rx="2" fill="#2A1C12"></rect><rect x="23" y="4" width="2" height="5" rx="1" fill="#2A1C12" fill-opacity=".4"></rect></svg></span>
      </div>

      <div style="text-align:center; padding:20px 24px 0;">
        <div style="width:96px; height:96px; margin:0 auto; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 14px 30px -16px rgba(184,82,42,.35);"><img src="6f19be5c-d0db-4148-a6c9-cbf460cd0dd1" style="width:72px; height:auto;"></div>
        <div class="pop" style="font-size:21px; font-weight:800; color:#2A1C12; margin-top:14px; line-height:1.2;">რიცხვები? ძალიან კარგი!</div>
      </div>

      <div style="display:flex; flex-direction:column; gap:14px; padding:26px 24px 0;">
        <!-- numbers SELECTED (lifted) -->
        <div style="position:relative; display:flex; align-items:center; gap:16px; background:#FFF6EC; border:3.5px solid #FF8A00; border-radius:26px; padding:18px; box-shadow:0 18px 32px -14px rgba(255,138,0,.55); transform:scale(1.03); animation:pop .5s ease-out;">
          <div style="position:absolute; top:12px; right:12px; width:30px; height:30px; border-radius:50%; background:#FF8A00; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 12px -4px rgba(255,138,0,.6);"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l4 4 10-10"></path></svg></div>
          <div style="width:76px; height:76px; border-radius:20px; background:linear-gradient(155deg,#FFD27A,#FF8A00); display:flex; align-items:center; justify-content:center; box-shadow:0 10px 18px -6px rgba(255,138,0,.6);"><span class="pop" style="font-size:36px; font-weight:800; color:#fff;">123</span></div>
          <div style="flex:1;"><div class="pop" style="font-size:24px; font-weight:800; color:#2A1C12;">რიცხვები</div><div style="font-size:13px; font-weight:700; color:#FF8A00;">აირჩიე ✓</div></div>
        </div>
        <!-- others recede -->
        <div style="display:flex; align-items:center; gap:16px; background:#fff; border:3px solid #F1E4D0; border-radius:26px; padding:16px 18px; opacity:.42;">
          <div style="width:64px; height:64px; border-radius:18px; background:linear-gradient(155deg,#5EE0BC,#00C48C); display:flex; align-items:center; justify-content:center;"><span class="pop" style="font-size:26px; font-weight:800; color:#fff;">აბგ</span></div>
          <div style="flex:1;"><div class="pop" style="font-size:21px; font-weight:800; color:#2A1C12;">ასოები</div></div>
        </div>
        <div style="display:flex; align-items:center; gap:16px; background:#fff; border:3px solid #F1E4D0; border-radius:26px; padding:16px 18px; opacity:.42;">
          <div style="width:64px; height:64px; border-radius:18px; background:linear-gradient(155deg,#73B4F5,#2E86DE); display:flex; align-items:center; justify-content:center;"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18M12 3c2.6 2.8 2.6 15.2 0 18M12 3c-2.6 2.8-2.6 15.2 0 18"></path></svg></div>
          <div style="flex:1;"><div class="pop" style="font-size:21px; font-weight:800; color:#2A1C12;">ენა</div></div>
        </div>
      </div>

      <div style="position:absolute; bottom:30px; left:24px; right:24px;">
        <div class="pop" style="position:relative; background:#FF8A00; color:#fff; text-align:center; font-size:19px; font-weight:800; padding:18px; border-radius:22px; box-shadow:0 14px 26px -10px rgba(255,138,0,.55); overflow:hidden;"><span style="position:absolute; top:0; left:0; width:45%; height:100%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.5),transparent); animation:sheen 4s ease-in-out infinite;"></span>დავიწყოთ!</div>
      </div>
    </div>
  </div>
  <div style="width:402px; margin-top:14px; background:#fff; border-radius:18px; padding:15px 17px; box-shadow:0 8px 20px -14px rgba(42,24,16,.25);">
    <div class="pop" style="font-size:15.5px; font-weight:800; color:#2A1C12;">„მე ავირჩიე!"</div>
    <div style="font-size:12.5px; color:#6E5A45; line-height:1.5; margin-top:4px;">არჩეული ბარათი იწევს ✓ ნიშნით, დანარჩენი ქრება — არჩევანი ნათელია ფერის გარეშეც. ნიკო მაშინვე ხმით ადასტურებს.</div>
  </div>
</div>


</body></html>
