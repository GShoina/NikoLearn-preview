<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>NikoLearn v2.00 — სწრაფი დაწყება</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Noto+Sans+Georgian:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1:#fbeede; --bg2:#f6e6cf; --card:#fffaf2; --ink:#332b3f; --muted:#8a8198;
    --orange:#ef8a2b; --orange-d:#d9761a; --green:#1f9b54; --green-d:#178045;
    --line:#ece0cb; --star:#f5b921; --shadow:0 14px 34px rgba(120,80,20,.16);
    --r:26px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{font-family:"Noto Sans Georgian","Fredoka",system-ui,sans-serif;color:var(--ink);
       background:radial-gradient(120% 100% at 50% 0%,var(--bg1),var(--bg2));
       min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .stage{width:100%;max-width:430px;height:100dvh;max-height:920px;position:relative;overflow:hidden;
         display:flex;flex-direction:column}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;
          padding:34px 24px calc(28px + env(safe-area-inset-bottom));opacity:0;transform:translateY(14px);
          pointer-events:none;transition:opacity .45s ease,transform .45s ease;justify-content:center;gap:6px}
  .screen.on{opacity:1;transform:none;pointer-events:auto}
  .niko{width:132px;height:132px;object-fit:contain;background:#fff;border-radius:32px;
        box-shadow:var(--shadow);padding:6px;animation:float 4.5s ease-in-out infinite}
  .niko.sm{width:76px;height:76px;border-radius:20px;animation:none}
  .wordmark{font-family:"Fredoka","Noto Sans Georgian",sans-serif;font-weight:700;font-size:1.7rem;letter-spacing:.5px;color:var(--ink);margin-bottom:2px}
  .wordmark span{color:var(--orange)}
  @keyframes float{50%{transform:translateY(-9px)}}
  .bubble{background:var(--card);border:1px solid var(--line);border-radius:22px;padding:15px 20px;
          box-shadow:var(--shadow);font-weight:700;font-size:1.18rem;text-align:center;max-width:330px;line-height:1.4}
  .bubble .sm{display:block;font-weight:600;font-size:.92rem;color:var(--muted);margin-top:4px}
  .choices{display:flex;flex-direction:column;gap:14px;width:100%;max-width:340px;margin-top:22px}
  .choice{display:flex;align-items:center;gap:16px;background:var(--card);border:2px solid var(--line);
          border-radius:var(--r);padding:18px 20px;font-weight:700;font-size:1.22rem;cursor:pointer;
          box-shadow:0 6px 16px rgba(120,80,20,.08);transition:transform .25s,box-shadow .25s,opacity .35s,border-color .25s}
  .choice .emoji{font-size:2rem;width:54px;height:54px;display:grid;place-items:center;
                 background:#fff3e2;border-radius:18px;flex:0 0 auto}
  .choice:active{transform:scale(.97)}
  .choice.pick{border-color:var(--orange);transform:translateY(-4px) scale(1.03);box-shadow:var(--shadow)}
  .choice.pick::after{content:"✓";margin-left:auto;color:var(--green);font-weight:800;font-size:1.4rem}
  .choice.fade{opacity:.18;transform:scale(.96)}
  .micro{color:var(--muted);font-weight:600;font-size:.9rem;margin-top:18px;display:flex;align-items:center;gap:7px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);display:inline-block}
  /* task */
  .audio{width:96px;height:96px;border-radius:50%;border:none;background:linear-gradient(180deg,var(--orange),var(--orange-d));
         color:#fff;font-size:2.2rem;box-shadow:0 12px 24px rgba(220,120,30,.4);cursor:pointer;margin:8px 0 4px;
         transition:transform .2s} .audio:active{transform:scale(.92)}
  .q{font-weight:800;font-size:1.5rem;text-align:center;margin:6px 0 2px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;width:100%;max-width:340px;margin-top:14px}
  .opt{background:var(--card);border:2px solid var(--line);border-radius:22px;padding:18px 10px;cursor:pointer;
       display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .2s,border-color .2s,box-shadow .2s}
  .opt .apples{font-size:1.7rem;line-height:1.1;letter-spacing:2px;text-align:center}
  .opt:active{transform:scale(.96)}
  .opt.right{border-color:var(--green);box-shadow:0 10px 22px rgba(30,150,80,.25);transform:translateY(-3px)}
  .opt.wrong{border-color:#e8c39a;animation:soft .5s}
  @keyframes soft{50%{transform:translateY(2px)}}
  /* win */
  .starwrap{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,#fff,#fff6e4);
            display:grid;place-items:center;box-shadow:var(--shadow);position:relative;animation:pop .6s cubic-bezier(.2,1.3,.4,1)}
  .starwrap .s{font-size:4.6rem;filter:drop-shadow(0 6px 10px rgba(220,160,20,.4))}
  @keyframes pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
  .spark{position:absolute;font-size:1.1rem;opacity:.9}
  .btn{margin-top:24px;border:none;border-radius:20px;padding:16px 30px;font-weight:700;font-size:1.1rem;
       background:linear-gradient(180deg,var(--green),var(--green-d));color:#fff;cursor:pointer;
       box-shadow:0 10px 22px rgba(30,140,80,.32);font-family:inherit} .btn:active{transform:scale(.97)}
  .ghost{background:none;color:var(--muted);box-shadow:none;font-size:.95rem;margin-top:10px;padding:8px}
  .badge{position:fixed;top:10px;left:10px;background:rgba(0,0,0,.06);color:#7a6f63;font-size:.7rem;
         padding:3px 9px;border-radius:20px;font-weight:700;z-index:9}
  .restart{position:fixed;top:8px;right:8px;background:rgba(0,0,0,.06);border:none;border-radius:20px;
           padding:5px 11px;font-size:.72rem;color:#7a6f63;cursor:pointer;z-index:9;font-family:inherit;font-weight:700}
</style>
</head>
<body>
<div class="badge">NikoLearn v2.00 · prototype</div>
<button class="restart" onclick="go('enter')">↻ თავიდან</button>

<div class="stage">

  <!-- 1. ENTER -->
  <section class="screen on" id="s-enter">
    <div class="wordmark">Niko<span>Learn</span></div>
    <img class="niko" src="assets/niko-logo.png" alt="ნიკო">
    <div class="bubble">გამარჯობა! მე ნიკო ვარ<span class="sm">რა ვისწავლოთ დღეს?</span></div>
    <div class="choices">
      <button class="choice" data-i="0" onclick="pick(this)"><span class="emoji">🔢</span> რიცხვები</button>
      <button class="choice" data-i="1" onclick="pick(this)"><span class="emoji">🔤</span> ასოები</button>
      <button class="choice" data-i="2" onclick="pick(this)"><span class="emoji">🌍</span> ენა</button>
    </div>
    <div class="micro"><span class="dot"></span> დრო გვაქვს. აქ არ ვჩქარობთ.</div>
  </section>

  <!-- 2. GO transition -->
  <section class="screen" id="s-go">
    <img class="niko" src="assets/niko-logo.png" alt="ნიკო">
    <div class="bubble" style="font-size:1.6rem">ყოჩაღ, წავედით! ✨</div>
  </section>

  <!-- 3. TASK -->
  <section class="screen" id="s-task">
    <img class="niko sm" src="assets/niko-logo.png" alt="ნიკო">
    <button class="audio" onclick="this.style.transform='scale(.92)';setTimeout(()=>this.style.transform='',150)">🔊</button>
    <div class="q">სად არის სამი ვაშლი?</div>
    <div class="micro" style="margin-top:2px"><span class="dot"></span> დააჭირე როცა მზად ხარ</div>
    <div class="grid" id="grid">
      <button class="opt" onclick="answer(this,false)"><div class="apples">🍎</div></button>
      <button class="opt" onclick="answer(this,false)"><div class="apples">🍎🍎🍎🍎</div></button>
      <button class="opt" onclick="answer(this,true)"><div class="apples">🍎🍎🍎</div></button>
      <button class="opt" onclick="answer(this,false)"><div class="apples">🍎🍎</div></button>
    </div>
    <div class="micro" id="notyet" style="visibility:hidden;color:#c98a3a">🌱 ჯერ არა, კიდევ დააკვირდი</div>
  </section>

  <!-- 4. WIN -->
  <section class="screen" id="s-win">
    <div class="starwrap">
      <span class="s">⭐</span>
      <span class="spark" style="top:14px;right:24px">✨</span>
      <span class="spark" style="bottom:20px;left:18px">✨</span>
    </div>
    <div class="bubble" style="margin-top:24px;font-size:1.5rem">შენ შეძელი! 🎉<span class="sm">პირველი ფიქრის ვარსკვლავი</span></div>
    <button class="btn" onclick="go('task')">კიდევ ვცადოთ</button>
    <button class="btn ghost" onclick="go('enter')">დავისვენოთ</button>
  </section>

</div>

<script>
  function go(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
    document.getElementById('s-'+id).classList.add('on');
    if(id==='task'){ // reset task
      document.querySelectorAll('#grid .opt').forEach(o=>o.className='opt');
      document.getElementById('notyet').style.visibility='hidden';
    }
  }
  function pick(el){
    document.querySelectorAll('#s-enter .choice').forEach(c=>{ c.classList.add('fade'); });
    el.classList.remove('fade'); el.classList.add('pick');
    setTimeout(()=>go('go'),750);
    setTimeout(()=>go('task'),1850);
  }
  function answer(el,correct){
    if(correct){
      el.classList.add('right');
      setTimeout(()=>go('win'),650);
    } else {
      el.classList.add('wrong');
      const n=document.getElementById('notyet'); n.style.visibility='visible';
      setTimeout(()=>el.classList.remove('wrong'),600);
    }
  }
</script>
</body>
</html>
