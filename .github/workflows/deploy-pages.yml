name: Deploy to GitHub Pages

# Replaces the legacy "deploy from a branch" flow, whose per-file CDN sync of ~1700 repo files
# (mostly the 1400+ audio clips) repeatedly timed out at the 10-minute deploy limit. This uploads
# the site as ONE tar artifact and deploys it atomically, which handles large static sites cleanly.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish (don't cancel a live deploy).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble published site (drop dev/build-only folders, keep CNAME)
        run: |
          mkdir -p _site
          rsync -a ./ _site/ \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude 'android' \
            --exclude 'v2-prototype' \
            --exclude 'docs' \
            --exclude 'tools' \
            --exclude 'qa' \
            --exclude 'scratchpad' \
            --exclude 'output' \
            --exclude '_site'
          echo "Published file count: $(find _site -type f | wc -l)"
          test -f _site/CNAME && echo "CNAME present: $(cat _site/CNAME)" || echo "WARNING: no CNAME"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          # actions/deploy-pages caps `timeout` at 600000ms (10 min); a larger value is silently
          # clamped and emits a warning. Keep it at the max so the log stays clean.
          timeout: 600000
