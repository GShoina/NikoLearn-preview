<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<style>
  @font-face{ font-family:'KA'; src:url('niko/fonts/ka.ttf') format('truetype'); font-weight:400 700; font-display:block; }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1200px;height:630px;overflow:hidden}
  .card{
    width:1200px;height:630px;display:flex;align-items:center;
    background:radial-gradient(125% 125% at 34% 42%, #fffdf9 0%, #fff1da 55%, #ffe3bd 100%);
    font-family:'KA','Noto Sans Georgian','Segoe UI',sans-serif;
  }
  .owl{width:430px;height:430px;margin-left:60px;margin-right:30px;object-fit:contain;flex:none;
    filter:drop-shadow(0 18px 40px rgba(220,150,40,.22))}
  .right{flex:1;padding-right:70px}
  .wordmark{font-family:'Segoe UI',Arial,sans-serif;font-weight:800;font-size:82px;letter-spacing:-2px;line-height:1}
  .wordmark .n{color:#2f2114}
  .wordmark .l{color:#f5990d}
  .tagline{font-weight:700;font-size:46px;color:#f5990d;margin-top:14px;line-height:1.1}
  .sub{font-weight:500;font-size:31px;color:#8a7a66;margin-top:20px;line-height:1.35;max-width:560px}
  .pills{display:flex;gap:20px;margin-top:40px}
  .pill{display:flex;align-items:center;gap:12px;background:#fffef9;border:1px solid #f1e7d5;
    border-radius:22px;padding:18px 26px;box-shadow:0 8px 22px rgba(120,90,40,.10)}
  .pill .ic{font-size:26px;line-height:1}
  .pill .ic.abc{font-family:'Segoe UI',sans-serif;font-weight:800;font-size:20px;color:#4a8de0}
  .pill .ic.ge{font-family:'Segoe UI',sans-serif;font-weight:800;font-size:20px;color:#067a3e}
  .pill .ic.num{font-family:'Segoe UI',sans-serif;font-weight:800;font-size:20px;color:#f5990d}
  .pill .tx{font-weight:700;font-size:26px;color:#3a2a1a}
</style>
</head>
<body>
  <div class="card">
    <img class="owl" src="owl-logo.png" alt="">
    <div class="right">
      <div class="wordmark"><span class="n">Niko</span><span class="l">Learn</span></div>
      <div class="tagline">ისწავლე თამაშით</div>
      <div class="sub">ქართული სასწავლო აპი<br>ბავშვებისთვის · 3-12 წ.</div>
      <div class="pills">
        <div class="pill"><span class="ic abc">abc</span><span class="tx">ინგლისური</span></div>
        <div class="pill"><span class="ic num">123</span><span class="tx">მათემატიკა</span></div>
        <div class="pill"><span class="ic ge">GE</span><span class="tx">ანბანი</span></div>
      </div>
    </div>
  </div>
</body>
</html>
